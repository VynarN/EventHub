name: eventhub

services:
  sqledge:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: eventhub-sqledge
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_PASSWORD}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -b -o /dev/null || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    networks:
      - eventhub

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    container_name: eventhub-servicebus-emulator
    pull_policy: if_not_present
    ports:
      - "5672:5672"
      - "5300:5300"
    volumes:
      - ./docker/servicebus-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    environment:
      SQL_SERVER: sqledge
      MSSQL_SA_PASSWORD: "${SQL_PASSWORD}"
      ACCEPT_EULA: "Y"
      SQL_WAIT_INTERVAL: "30"
      EMULATOR_HTTP_PORT: "5300"
      # Linux container: prefer server GC (emulator logs FTL when disabled).
      DOTNET_gcServer: "1"
    depends_on:
      sqledge:
        condition: service_healthy
    networks:
      - eventhub

  cosmos-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: eventhub-cosmos-emulator
    pull_policy: if_not_present
    ports:
      - "8081:8081"
      - "1234:1234"
    environment:
      PROTOCOL: https
      GATEWAY_PUBLIC_ENDPOINT: cosmos-emulator
      ENABLE_EXPLORER: "true"
    mem_limit: 4g
    networks:
      - eventhub

  eventhub-bff:
    build:
      context: .
      dockerfile: EventHub.BFF/Dockerfile
    container_name: eventhub-bff
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ReverseProxy__Clusters__webApiCluster__Destinations__default__Address: http://eventhub-webapi:8080
    depends_on:
      - eventhub-webapi
    networks:
      - eventhub

  eventhub-webapi:
    build:
      context: .
      dockerfile: EventHub.WebApi/Dockerfile
    container_name: eventhub-webapi
    ports:
      - "5080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      APPLICATIONINSIGHTS_CONNECTION_STRING: "${APPLICATIONINSIGHTS_CONNECTION_STRING:-}"
      CosmosDb__ConnectionString: "AccountEndpoint=https://cosmos-emulator:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=="
      CosmosDb__DisableServerCertificateValidation: "true"
      ServiceBus__ConnectionString: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      ServiceBus__QueueName: "queue.1"
    depends_on:
      - cosmos-emulator
      - servicebus-emulator
    networks:
      - eventhub

  eventhub-functions:
    build:
      context: .
      dockerfile: EventHub.FunctionApp/Dockerfile
    container_name: eventhub-functions
    ports:
      - "7071:80"
    environment:
      AzureWebJobsStorage: UseDevelopmentStorage=true
      FUNCTIONS_WORKER_RUNTIME: dotnet-isolated
      ASPNETCORE_ENVIRONMENT: Development
      APPLICATIONINSIGHTS_CONNECTION_STRING: "${APPLICATIONINSIGHTS_CONNECTION_STRING:-}"
      CosmosDb__ConnectionString: "AccountEndpoint=https://cosmos-emulator:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=="
      CosmosDb__DisableServerCertificateValidation: "true"
      ServiceBusConnection: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
    depends_on:
      cosmos-emulator:
        condition: service_started
      servicebus-emulator:
        condition: service_started
    networks:
      - eventhub

networks:
  eventhub:
    driver: bridge