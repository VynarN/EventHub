# BFF (+ Angular SPA): build SPA, build BFF, optional SPA tests, deploy after approval per environment.
# Per environment Variables (shared RG/vault names with other workflows; app names are separate):
#   - AZURE_RESOURCE_GROUP, AZURE_KEY_VAULT_NAME (same as Web API / Function pipelines)
#   - AZURE_BFF_WEBAPP_NAME   (BFF App Service, e.g. eh-dev-bff — must differ from AZURE_WEBAPI_NAME)
#   - ASPNETCORE_ENVIRONMENT  (e.g. Development for dev, Staging for test — match Terraform locals)
#   - WEB_API_PUBLIC_URL      (e.g. https://eh-dev-webapi.azurewebsites.net)

name: BFF

on:
  push:
    branches: [main]
    paths:
      - "EventHub.BFF/**"
      - "eventhub-spa/**"
      - ".github/workflows/eventhub-bff.yml"
      - ".github/scripts/**"
  workflow_dispatch:

concurrency:
  group: eventhub-bff-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: eventhub-spa/package-lock.json

      - name: Install & build SPA
        working-directory: eventhub-spa
        run: |
          npm ci
          npm run build

      - name: Test SPA (unit)
        working-directory: eventhub-spa
        run: npx ng test --watch=false
        continue-on-error: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build & publish BFF
        run: |
          dotnet restore EventHub.BFF/EventHub.BFF.csproj
          dotnet publish EventHub.BFF/EventHub.BFF.csproj -c Release -o "${{ github.workspace }}/publish"

      - uses: actions/upload-artifact@v4
        with:
          name: bff-publish
          path: publish/

  deploy:
    name: Deploy → ${{ matrix.environment }} (approval)
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, test]
    environment: ${{ matrix.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: bff-publish
          path: publish

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Zip release
        run: (cd publish && zip -r "$GITHUB_WORKSPACE/site.zip" .)

      - name: Deploy to App Service
        run: |
          az webapp deployment source config-zip \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_BFF_WEBAPP_NAME }}" \
            --src site.zip

      - name: Apply app settings (Key Vault references + BFF config)
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          APP: ${{ vars.AZURE_BFF_WEBAPP_NAME }}
          VAULT: ${{ vars.AZURE_KEY_VAULT_NAME }}
          ASPNETCORE_ENVIRONMENT: ${{ vars.ASPNETCORE_ENVIRONMENT }}
          WEB_API_PUBLIC_URL: ${{ vars.WEB_API_PUBLIC_URL }}
        run: bash .github/scripts/apply-bff-app-service-kv-settings.sh "$RG" "$APP" "$VAULT"
