# Function App: build, test, deploy to dev/test after manual approval per environment.
# Per environment Variables: AZURE_RESOURCE_GROUP, AZURE_KEY_VAULT_NAME (shared with other pipelines),
# plus AZURE_FUNCTION_APP_NAME (e.g. eh-dev-func — not AZURE_WEBAPI_NAME / AZURE_BFF_WEBAPP_NAME).

name: Function App

on:
  push:
    branches: [main]
    paths:
      - "EventHub.FunctionApp/**"
      - "EventHub.Cosmos/**"
      - "EventHub.FunctionApp.Tests/**"
      - ".github/workflows/eventhub-functionapp.yml"
      - ".github/scripts/**"
  workflow_dispatch:

concurrency:
  group: eventhub-functionapp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore, test, publish
        run: |
          dotnet restore EventHub.FunctionApp/EventHub.FunctionApp.csproj
          dotnet test EventHub.FunctionApp.Tests/EventHub.FunctionApp.Tests.csproj -c Release --verbosity normal 
          dotnet publish EventHub.FunctionApp/EventHub.FunctionApp.csproj -c Release -o "${{ github.workspace }}/publish"
          
      - name: Zip publish output
        run: (cd "${{ github.workspace }}/publish" && zip -r "${{ github.workspace }}/func.zip" .)

      - uses: actions/upload-artifact@v4
        with:
          name: functionapp-publish
          path: func.zip

  deploy:
    name: Deploy → ${{ matrix.environment }} (approval)
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, test]
    environment: ${{ matrix.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: functionapp-publish
          path: ${{ github.workspace }}

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Deploy to Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTION_APP_NAME }}
          package: func.zip
          # No publish-profile: azure/login@v2 above provides OIDC credentials.

      # win-x64 zip + 32-bit worker = worker fails to start (0 functions). Terraform also sets this; enforce after deploy.
      - name: Use 64-bit worker process
        run: |
          az functionapp config set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_FUNCTION_APP_NAME }}" \
            --use-32bit-worker-process false

      - name: Apply app settings (Key Vault references)
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          APP: ${{ vars.AZURE_FUNCTION_APP_NAME }}
          VAULT: ${{ vars.AZURE_KEY_VAULT_NAME }}
        run: bash .github/scripts/apply-functionapp-kv-settings.sh "$RG" "$APP" "$VAULT"

      # After applying KV-referenced settings, restart so the managed identity can resolve them.
      # appsettings set triggers a soft recycle; an explicit restart ensures a clean worker
      # startup with all settings resolved and triggers active.
      - name: Restart
        run: |
          az functionapp restart \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_FUNCTION_APP_NAME }}"
